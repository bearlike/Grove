name: Docs Cleanup

# GitHub Pages (mike) version cleanup. Both jobs are guarded to github.com; on
# the internal mirror they no-op (preview cleanup lives in docs.yml).
on:
  pull_request:
    types: [closed]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  cleanup-pr-version:
    if: |
      github.server_url == 'https://github.com' &&
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      contains(fromJSON('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.pull_request.author_association) &&
      !contains(github.actor, '[bot]')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install docs dependencies
        run: |
          python -m pip install --upgrade pip uv
          uv sync --group docs

      - name: Configure git for mike
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Delete PR docs version
        run: |
          VERSION="pr-${{ github.event.pull_request.number }}"
          uv run mike delete --push "$VERSION" || echo "no version $VERSION; nothing to clean"

  bulk-delete-pr-versions:
    if: github.server_url == 'https://github.com' && github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install docs dependencies
        run: |
          python -m pip install --upgrade pip uv
          uv sync --group docs

      - name: Configure git for mike
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Delete all pr-* versions
        run: |
          versions=$(uv run mike list | grep -E '^pr-[0-9]+' | awk '{print $1}' || true)
          if [ -z "$versions" ]; then
            echo "No pr-* versions found."
            exit 0
          fi
          echo "Deleting: $versions"
          for version in $versions; do
            uv run mike delete "$version"
          done
          git push origin gh-pages
