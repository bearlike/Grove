name: Docs Build

on:
  push:
    branches:
      - current
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install docs dependencies
        run: |
          python -m pip install --upgrade pip uv
          uv sync --group docs

      - name: Generate build info
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          printf '{"commit":"%s"}\n' "$SHORT_SHA" > docs/build-info.json

      - name: Generate config schema into docs/
        # Best-effort: if the engine ever fails to import in this env the
        # docs build still succeeds (the hook degrades to a stub page).
        run: |
          .venv/bin/grove config schema --stdout > docs/grove.schema.json || true

      - name: Verify mkdocstrings imports
        run: .venv/bin/python -c "import grove.core; print(grove.core.__name__)"

      - name: Configure git for mike
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Deploy docs (push to current)
        if: github.ref == 'refs/heads/current'
        run: |
          PATH=".venv/bin:$PATH" .venv/bin/mike deploy --push --update-aliases current latest --alias-type copy
          PATH=".venv/bin:$PATH" .venv/bin/mike set-default --push latest

      - name: Deploy PR docs
        if: |
          github.event_name == 'pull_request' &&
          github.event.pull_request.head.repo.full_name == github.repository &&
          contains(fromJSON('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.pull_request.author_association) &&
          !contains(github.actor, '[bot]')
        run: |
          VERSION="pr-${{ github.event.pull_request.number }}"
          PATH=".venv/bin:$PATH" .venv/bin/mike deploy --push "$VERSION"
