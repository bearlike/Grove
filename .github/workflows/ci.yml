name: CI

on:
  push:
    branches: ["**"]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint + Types + Contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: Install
        run: uv sync --all-groups
      - name: Lint
        run: make lint

  test:
    name: Test
    # Linux-only: Grove is a terminal (tmux-centric) app + loopback daemon.
    # There is no macOS/Windows matrix — tmux is the runtime dependency and
    # native packaging was retired, so cross-OS legs added cost without signal.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: Install
        run: uv sync --all-groups
      - name: Install tmux
        run: sudo apt-get update && sudo apt-get install -y tmux
      - name: Unit + Pilot tests
        run: uv run pytest -m "not integration"
      - name: Integration tests (real tmux + git)
        run: uv run pytest -m integration
