name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  id-token: write  # required for PyPI Trusted Publishing (OIDC)

jobs:
  build:
    name: Build wheel + sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: Build
        run: uv build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: |
            dist/*.whl
            dist/*.tar.gz

  github-release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - uses: softprops/action-gh-release@v2
        with:
          name: "Grove ${{ github.ref_name }}"
          generate_release_notes: true
          body: |
            ## Install

            ```bash
            # ephemeral, isolated env (recommended)
            uvx grove

            # persistent install
            uv tool install grove==${{ github.ref_name }}

            # bleeding edge (latest commit on main)
            uvx --from git+https://github.com/${{ github.repository }} grove
            ```

            See the auto-generated notes below for the change summary.
          files: |
            dist/*.whl
            dist/*.tar.gz
          fail_on_unmatched_files: false

  pypi-publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    # Requires PyPI Trusted Publishing for this repo + workflow + environment.
    # See https://docs.pypi.org/trusted-publishers/
    environment:
      name: pypi
      url: https://pypi.org/p/grove
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
